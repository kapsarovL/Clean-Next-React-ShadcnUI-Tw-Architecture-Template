# .github/workflows/deploy.yml
# Builds and deploys to Vercel on every push to main.
# Runs the full test suite first — deploy is blocked if tests fail.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN        — from vercel.com/account/tokens
#   VERCEL_ORG_ID       — from .vercel/project.json after running `vercel link`
#   VERCEL_PROJECT_ID   — from .vercel/project.json after running `vercel link`

name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run test

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: test  # Deploy only runs if the test job succeeds
    permissions:
      contents: write  # required to post commit comments
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment deployment URL on commit
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `✅ Deployed to production: ${{ steps.deploy.outputs.url }}`
            });